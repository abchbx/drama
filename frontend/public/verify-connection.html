<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DramaFlow - 连接验证</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #333; margin-bottom: 20px; }
        .status-card {
            padding: 16px;
            border-radius: 6px;
            margin: 12px 0;
            border-left: 4px solid #ccc;
        }
        .status-card.success { background: #f0fff4; border-color: #48bb78; }
        .status-card.error { background: #fff5f5; border-color: #f56565; }
        .status-card.info { background: #ebf8ff; border-color: #4299e1; }
        .status-card.warning { background: #fffff0; border-color: #ecc94b; }
        .log-entry {
            padding: 8px 12px;
            margin: 4px 0;
            background: #f7fafc;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
        }
        button {
            background: #4299e1;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 8px;
        }
        button:hover { background: #3182ce; }
        .section { margin: 24px 0; }
        .section h2 { color: #555; margin-bottom: 12px; font-size: 18px; }
        #logs { max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 DramaFlow 连接验证工具</h1>

        <div class="section">
            <button onclick="startTest()">开始测试</button>
            <button onclick="clearLogs()">清除日志</button>
        </div>

        <div class="section">
            <h2>连接状态</h2>
            <div id="connection-status" class="status-card info">
                等待测试...
            </div>
        </div>

        <div class="section">
            <h2>环境信息</h2>
            <div id="env-info" class="status-card info">
                加载中...
            </div>
        </div>

        <div class="section">
            <h2>测试日志</h2>
            <div id="logs"></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script>
        const logsDiv = document.getElementById('logs');
        const statusDiv = document.getElementById('connection-status');
        const envDiv = document.getElementById('env-info');
        let testSocket = null;

        function log(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.prepend(entry);
            console.log(`[${type}] ${message}`);
        }

        function clearLogs() {
            logsDiv.innerHTML = '';
        }

        function updateStatus(status, message, type) {
            statusDiv.className = `status-card ${type}`;
            statusDiv.textContent = message;
        }

        function showEnvInfo() {
            const info = {
                '当前 URL': window.location.href,
                'Origin': window.location.origin,
                'Protocol': window.location.protocol,
                'Host': window.location.host,
                'User Agent': navigator.userAgent.substring(0, 50) + '...',
            };
            envDiv.innerHTML = Object.entries(info)
                .map(([key, value]) => `<strong>${key}:</strong> ${value}`)
                .join('<br>');
        }

        async function startTest() {
            clearLogs();
            showEnvInfo();

            log('🚀 开始连接测试...', 'info');
            updateStatus('connecting', '正在测试连接...', 'warning');

            // 测试 1: 直接连接后端
            await testDirectConnection();

            // 测试 2: 通过 Vite 代理连接
            await testProxyConnection();
        }

        function testDirectConnection() {
            return new Promise((resolve) => {
                log('🧪 测试 1: 直接连接后端 (http://localhost:3000)', 'info');

                const socket = io('http://localhost:3000', {
                    path: '/socket.io/',
                    transports: ['websocket', 'polling'],
                    reconnection: false,
                    timeout: 3000,
                });

                testSocket = socket;

                socket.on('connect', () => {
                    log(`✅ 直接连接成功！Socket ID: ${socket.id}`, 'success');
                    log(`   传输方式: ${socket.io.engine.transport.name}`, 'success');

                    socket.disconnect();
                    resolve(true);
                });

                socket.on('connect_error', (error) => {
                    log(`❌ 直接连接失败: ${error.message}`, 'error');
                    log(`   详细错误: ${error.description || '无'}`, 'error');
                    socket.disconnect();
                    resolve(false);
                });

                setTimeout(() => {
                    if (socket.connected) {
                        socket.disconnect();
                        resolve(true);
                    } else {
                        log('⏱️ 直接连接超时', 'error');
                        socket.disconnect();
                        resolve(false);
                    }
                }, 3000);
            });
        }

        function testProxyConnection() {
            return new Promise((resolve) => {
                log('🧪 测试 2: 通过 Vite 代理连接', 'info');

                const socket = io(window.location.origin, {
                    path: '/socket.io/',
                    transports: ['websocket', 'polling'],
                    reconnection: false,
                    timeout: 3000,
                });

                testSocket = socket;

                socket.on('connect', () => {
                    log(`✅ 代理连接成功！Socket ID: ${socket.id}`, 'success');
                    log(`   传输方式: ${socket.io.engine.transport.name}`, 'success');

                    updateStatus('success', '✅ 所有连接测试通过！', 'success');
                    log('🎉 连接验证完成！应用应该能正常显示连接状态。', 'success');

                    socket.disconnect();
                    resolve(true);
                });

                socket.on('connect_error', (error) => {
                    log(`❌ 代理连接失败: ${error.message}`, 'error');
                    log(`   详细错误: ${error.description || '无'}`, 'error');

                    updateStatus('error', '❌ 连接失败', 'error');
                    log('🔧 故障排除建议:', 'warning');
                    log('1. 检查后端是否运行在端口 3000', 'warning');
                    log('2. 检查前端是否运行在端口 5174', 'warning');
                    log('3. 检查 Vite 代理配置', 'warning');
                    log('4. 查看浏览器控制台的详细错误', 'warning');

                    socket.disconnect();
                    resolve(false);
                });

                setTimeout(() => {
                    if (socket.connected) {
                        socket.disconnect();
                        resolve(true);
                    } else {
                        log('⏱️ 代理连接超时', 'error');
                        updateStatus('error', '❌ 连接超时', 'error');
                        socket.disconnect();
                        resolve(false);
                    }
                }, 3000);
            });
        }

        // 页面加载后自动开始测试
        setTimeout(startTest, 1000);
    </script>
</body>
</html>
